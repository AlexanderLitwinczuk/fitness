// ── FIREBASE HELPERS (compat SDK) ─────────────────────────────────────────────

// Wait for window.db to be available (Firebase loads async relative to Babel)
const waitForDb = () => new Promise((resolve, reject) => {
  // Poll until window.db is available (Firebase compat init is synchronous
  // but Babel may compile before or after — poll to be safe)
  let attempts = 0;
  const check = () => {
    if (window.db) { resolve(window.db); return; }
    attempts++;
    if (attempts > 50) { reject(new Error("Firebase db not available after 5 seconds")); return; }
    setTimeout(check, 100);
  };
  check();
});

const fbSave = async (key, data) => {
  try {
    const db = await waitForDb();
    await db.collection("sessions").doc(key).set(data);
    return true;
  } catch(e){ console.error("Firebase save error:", e); return false; }
};

const fbLoadAll = async () => {
  try {
    const db = await waitForDb();
    const snap = await db.collection("sessions").get();
    const result = {};
    snap.forEach(doc => { result[doc.id] = doc.data(); });
    return result;
  } catch(e){ console.error("Firebase load error:", e); return {}; }
};

const fbDelete = async (key) => {
  try {
    const db = await waitForDb();
    await db.collection("sessions").doc(key).delete();
  } catch(e){ console.error("Firebase delete error:", e); }
};

// ── GROCERY LIST ──────────────────────────────────────────────────────────────

function GroceryList(){
  const [checked, setChecked] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(()=>{
    fbLoadAll().then(s=>{
      if(s["grocery_checklist"]) setChecked(s["grocery_checklist"].items||{});
      setLoaded(true);
    });
  },[]);

  const toggle = async(id) => {
    const updated = {...checked, [id]:!checked[id]};
    setChecked(updated);
    await fbSave("grocery_checklist", {items:updated, updatedAt:new Date().toISOString()});
  };

  const clearAll = async() => {
    setChecked({});
    await fbSave("grocery_checklist", {items:{}, updatedAt:new Date().toISOString()});
  };

  const totalItems = GROCERY.reduce((a,c)=>a+c.items.length,0);
  const checkedCount = Object.values(checked).filter(Boolean).length;

  if(!loaded) return(
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div className="spinner" style={{width:32,height:32,margin:"0 auto 14px"}}/>
      <div style={{color:"#475569",fontSize:13}}>Connecting to Firebase...</div>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:11,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:600}}>Weekly Grocery List</div>
          <div style={{fontSize:11,color:"#22c55e",marginTop:3}}>☁️ Synced — check off as you shop on any device</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontSize:12,color:"#94a3b8"}}>{checkedCount}/{totalItems}</div>
          <button className="btn" onClick={clearAll} style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,color:"#f87171"}}>Reset</button>
        </div>
      </div>
      <div style={{background:"rgba(255,255,255,.06)",borderRadius:6,height:6,marginBottom:18,overflow:"hidden"}}>
        <div style={{width:`${(checkedCount/totalItems)*100}%`,background:"#22c55e",height:"100%",borderRadius:6,transition:"width .3s ease"}}/>
      </div>
      {GROCERY.map(cat=>(
        <div key={cat.category} style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:cat.color,flexShrink:0}}/>
            <div style={{fontSize:12,fontWeight:700,color:cat.color,letterSpacing:1,textTransform:"uppercase"}}>{cat.category}</div>
          </div>
          {cat.items.map((item,i)=>{
            const id=`${cat.category}_${i}`;
            const isChecked=!!checked[id];
            return(
              <div key={id} className={`check-item${isChecked?" checked":""}`} onClick={()=>toggle(id)}>
                <div className={`check-box${isChecked?" checked":""}`}>
                  {isChecked&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:isChecked?"#475569":"#f1f5f9",textDecoration:isChecked?"line-through":"none",transition:"all .15s"}}>{item.name}</div>
                  <div style={{fontSize:11,color:"#475569",marginTop:2}}>{item.qty} — {item.note}</div>
                </div>
              </div>
            );
          })}
        </div>
      ))}
      <div style={{padding:"11px 15px",background:"rgba(249,115,22,.08)",border:"1px solid rgba(249,115,22,.2)",borderRadius:12,fontSize:12,color:"#fdba74",lineHeight:1.7}}>
        <strong>🛒 Tip:</strong> Open this on your phone in the grocery store — checks sync instantly. Reset button clears all checks for your next shop.
      </div>
    </div>
  );

function Tracker(){
  const [activeDayIdx, setActiveDayIdx] = useState(0);
  const [sessions, setSessions] = useState({});
  const [date, setDate] = useState(todayStr());
  const [bodyweight, setBodyweight] = useState("");
  const [notes, setNotes] = useState("");
  const [weekType, setWeekType] = useState("max");
  const [saveStatus, setSaveStatus] = useState("idle");
  const [loading, setLoading] = useState(true);
  const [viewHistory, setViewHistory] = useState(false);
  const [historyDay, setHistoryDay] = useState("d1");
  const [historyFilter, setHistoryFilter] = useState("all");
  const [setData, setSetData] = useState({});
  const debounceRef = useRef(null);
  const day = DAYS[activeDayIdx];
  const sessionKey = date + "_" + day.id + "_" + weekType;

  useEffect(()=>{
    fbLoadAll().then(s=>{
      setSessions(s);
      setLoading(false);
    });
  },[]);

  useEffect(()=>{
    const s = sessions[sessionKey];
    setBodyweight(s?.bodyweight||"");
    setNotes(s?.notes||"");
    setSetData(s?.exercises||{});
  },[sessionKey, sessions]);

  const buildDoc = (overrides={}) => ({
    date, dayId:day.id, dayName:day.name,
    weekType, bodyweight, notes, exercises:setData,
    updatedAt:new Date().toISOString(), ...overrides
  });

  const handleSave = async() => {
    setSaveStatus("saving");
    const d = buildDoc();
    const ok = await fbSave(sessionKey, d);
    if(ok){
      setSessions(p=>({...p,[sessionKey]:d}));
      setSaveStatus("saved");
      setTimeout(()=>setSaveStatus("idle"),2500);
    } else {
      setSaveStatus("error");
      setTimeout(()=>setSaveStatus("idle"),2500);
    }
  };

  const updateSet = (exId, si, field, value) => {
    setSetData(prev=>{
      const updated = {
        ...prev,
        [exId]:{...prev[exId],[si]:{...prev[exId]?.[si],[field]:value}}
      };
      if(debounceRef.current) clearTimeout(debounceRef.current);
      debounceRef.current = setTimeout(async()=>{
        const d = buildDoc({exercises:updated});
        await fbSave(sessionKey, d);
        setSessions(p=>({...p,[sessionKey]:d}));
      }, 1500);
      return updated;
    });
  };

  const getLastSession = (dayId) =>
    Object.keys(sessions).filter(k=>k.endsWith("_"+dayId)&&k!==sessionKey)
      .sort().reverse().map(k=>sessions[k])[0]||null;

  const lastSession = getLastSession(day.id);
  const getLastSet = (exId,si) => lastSession?.exercises?.[exId]?.[si]||null;
  const getCurSet = (exId,si) => setData?.[exId]?.[si]||{weight:"",reps:""};

  const handleDeleteAll = async() => {
    if(!window.confirm("Delete ALL session data? Cannot be undone.")) return;
    const keys = Object.keys(sessions).filter(k=>k!=="grocery_checklist");
    for(const k of keys) await fbDelete(k);
    setSessions(p=>{const n={...p};keys.forEach(k=>delete n[k]);return n;});
  };

  if(loading) return(
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div className="spinner" style={{width:32,height:32,margin:"0 auto 14px"}}/>
      <div style={{color:"#475569",fontSize:13}}>Loading your sessions from Firebase...</div>
    </div>
  );

  // History view
  if(viewHistory){
    const hDay = DAYS.find(d=>d.id===historyDay);
    const hist = Object.keys(sessions)
      .filter(k=>{
        if(!k.includes("_"+historyDay+"_")) return false;
        if(historyFilter==="all") return true;
        return k.endsWith("_"+historyFilter);
      })
      .sort().reverse().map(k=>sessions[k]);
    return(
      <div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button className="btn" onClick={()=>setViewHistory(false)} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:600,color:"#e2e8f0"}}>← Back</button>
          <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>Session History</div>
          <div style={{marginLeft:"auto",fontSize:11,color:"#22c55e"}}>☁️ Synced</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {DAYS.map(d=>(
            <button key={d.id} className="btn day-btn" onClick={()=>setHistoryDay(d.id)} style={{background:historyDay===d.id?d.color:"rgba(255,255,255,.04)",border:`1px solid ${historyDay===d.id?d.color:"rgba(255,255,255,.08)"}`,borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,color:historyDay===d.id?"#fff":"#94a3b8"}}>{d.label}</button>

// Get ISO week key for a date: "2026-W14"
function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  const yearStart = new Date(d.getFullYear(),0,1);
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
  return d.getFullYear() + "-W" + String(weekNo).padStart(2,"0");
}

// Get Monday of the week containing a date
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

// Format date as "Apr 7"
function fmtShort(date) {
  return date.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

// Get array of week objects for display (past 6 + current + future 14 = 21 weeks)
function getWeeks() {
  const today = new Date();
  const monday = getMonday(today);
  const weeks = [];
  for (let i = -6; i <= 14; i++) {
    const weekStart = new Date(monday);
    weekStart.setDate(monday.getDate() + i * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    weeks.push({
      key: getWeekKey(weekStart),
      start: new Date(weekStart),
      end: weekEnd,
      isCurrent: i === 0,
      isPast: i < 0,
      isFuture: i > 0,
    });
  }
  return weeks;
}

function CalendarTracker() {
  const [calData, setCalData] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [selectedWeek, setSelectedWeek] = useState(null);
  const [weekNotes, setWeekNotes] = useState("");
  const [notesSaved, setNotesSaved] = useState(false);

  const weeks = getWeeks();
  const currentWeekKey = getWeekKey(new Date());

  useEffect(() => {
    fbLoadAll().then(s => {
      if (s["calendar"]) setCalData(s["calendar"].weeks || {});
      setLoading(false);
    });
  }, []);

  const setWeekType = async (weekKey, type) => {
    setSaving(true);
    const updated = { ...calData, [weekKey]: { ...calData[weekKey], type, updatedAt: new Date().toISOString() } };
    setCalData(updated);
    await fbSave("calendar", { weeks: updated, updatedAt: new Date().toISOString() });
    setSaving(false);
  };

  const saveNotes = async (weekKey, notes) => {
    const updated = { ...calData, [weekKey]: { ...calData[weekKey], notes, updatedAt: new Date().toISOString() } };
    setCalData(updated);
    await fbSave("calendar", { weeks: updated, updatedAt: new Date().toISOString() });
    setNotesSaved(true);
    setTimeout(() => setNotesSaved(false), 2000);
  };

  // Count cycles and determine deload suggestion
  const getCycleInfo = () => {
    const sorted = weeks.filter(w => !w.isFuture).map(w => calData[w.key]?.type).filter(Boolean);
    let cycles = 0;
    let consecutive = 0;
    let lastWasDeload = false;
    for (const t of sorted) {
      if (t === "deload" || t === "rest") { lastWasDeload = true; consecutive = 0; }
      else { consecutive++; lastWasDeload = false; }
      if (consecutive === 2) { cycles++; consecutive = 0; } // ME + Volume = 1 cycle
    }
    // consecutive remaining (incomplete cycle)
    const sinceLastDeload = sorted.slice().reverse().findIndex(t => t === "deload" || t === "rest");
    const weeksSinceDeload = sinceLastDeload === -1 ? sorted.length : sinceLastDeload;
    const needsDeload = weeksSinceDeload >= 10;
    const suggestDeload = weeksSinceDeload >= 9;
    return { cycles, weeksSinceDeload, needsDeload, suggestDeload };
  };

  const { cycles, weeksSinceDeload, needsDeload, suggestDeload } = getCycleInfo();

  // Auto-suggest next expected week type based on last logged week
  const getExpectedType = (weekKey) => {
    const allKeys = weeks.map(w => w.key);
    const idx = allKeys.indexOf(weekKey);
    // Find last logged week before this one
    for (let i = idx - 1; i >= 0; i--) {
      const t = calData[allKeys[i]]?.type;
      if (t) {
        if (t === "deload" || t === "rest") return "max";
        if (t === "max") return weeksSinceDeload >= 9 ? "deload" : "volume";
        if (t === "volume") return weeksSinceDeload >= 9 ? "deload" : "max";
        return "max";
      }
    }
    return "max"; // default first week
  };

  if (loading) return (
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div className="spinner" style={{width:32,height:32,margin:"0 auto 14px"}}/>
      <div style={{color:"#475569",fontSize:13}}>Loading calendar...</div>
    </div>
  );

  const selWeekData = selectedWeek ? calData[selectedWeek] : null;
  const selWeekObj = weeks.find(w => w.key === selectedWeek);

  return (
    <div>
      {/* Header stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[
          {label:"Full Cycles",value:cycles,sub:"ME + Vol = 1 cycle",color:"#f97316"},
          {label:"Weeks Since Deload",value:weeksSinceDeload,sub:weeksSinceDeload>=10?"⚠️ Deload overdue!":weeksSinceDeload>=8?"Getting close...":"On track",color:weeksSinceDeload>=10?"#ef4444":weeksSinceDeload>=8?"#eab308":"#22c55e"},
          {label:"Next Deload",value:Math.max(0,10-weeksSinceDeload),sub:"weeks away",color:"#3b82f6"},
        ].map((s,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${s.color}33`,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:s.color,lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginTop:2}}>{s.label}</div>
            <div style={{fontSize:10,color:weeksSinceDeload>=10&&s.label==="Weeks Since Deload"?"#f87171":"#475569",marginTop:3}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Deload warning */}
      {needsDeload && (
        <div style={{padding:"11px 15px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,fontSize:12,color:"#fca5a5",lineHeight:1.6,marginBottom:14}}>
          <strong>⚠️ Deload overdue!</strong> You've been training hard for {weeksSinceDeload}+ weeks without a deload. Schedule one this week or next — 50% volume, 60% of your usual weight. You'll come back stronger.
        </div>
      )}
      {!needsDeload && suggestDeload && (
        <div style={{padding:"11px 15px",background:"rgba(234,179,8,.08)",border:"1px solid rgba(234,179,8,.2)",borderRadius:12,fontSize:12,color:"#fde68a",lineHeight:1.6,marginBottom:14}}>
          <strong>📅 Deload coming up.</strong> Plan a deload week within the next 1–2 weeks — you're at {weeksSinceDeload} weeks of hard training.
        </div>
      )}

      {/* Legend */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {Object.entries(WEEK_TYPES).map(([key,wt])=>(
          <div key={key} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:8,background:wt.bg,border:`1px solid ${wt.border}`,fontSize:11,color:wt.color,fontWeight:600}}>
            {wt.icon} {wt.label}

        <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:8,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",fontSize:11,color:"#475569"}}>
          ○ Unlogged
        </div>
      </div>

      {/* Week grid */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
        {weeks.map(week => {
          const data = calData[week.key];
          const type = data?.type;
          const wt = type ? WEEK_TYPES[type] : null;
          const expected = !type && !week.isPast ? getExpectedType(week.key) : null;
          const expWt = expected ? WEEK_TYPES[expected] : null;
          const isSelected = selectedWeek === week.key;

          return (
            <div key={week.key} onClick={()=>{ setSelectedWeek(isSelected?null:week.key); setWeekNotes(data?.notes||""); }}
              style={{
                borderRadius:12, padding:"11px 14px", cursor:"pointer",

                background:isSelected?(wt?wt.bg:"rgba(249,115,22,.08)"):wt?wt.bg:week.isCurrent?"rgba(255,255,255,.04)":"rgba(255,255,255,.02)",

                  {week.isPast&&!week.isCurrent&&<div style={{fontSize:10,color:"#475569"}}>Past</div>}
                  <div style={{fontSize:13,fontWeight:700,color:wt?wt.color:"#94a3b8"}}>
                    {fmtShort(week.start)} – {fmtShort(week.end)}
                  </div>
                  <div style={{fontSize:10,color:"#475569"}}>{week.key}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {type ? (
                    <div style={{fontSize:11,fontWeight:700,color:wt.color}}>{wt.icon} {wt.label}</div>
                  ) : expected&&!week.isPast ? (
                    <div style={{fontSize:11,color:"#475569",fontStyle:"italic"}}>→ Suggested: {expWt.icon} {expWt.label}</div>
                  ) : week.isPast ? (
                    <div style={{fontSize:11,color:"#475569"}}>Not logged</div>
                  ) : null}
                  {data?.notes&&<div style={{fontSize:10,color:"#64748b"}}>📝</div>}
                </div>
              </div>
              {isSelected&&(
                <div onClick={e=>e.stopPropagation()} style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,.08)"}}>
                  <div style={{fontSize:11,color:"#475569",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Set week type</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                    {Object.entries(WEEK_TYPES).map(([key,wt])=>(
                      <button key={key} className="btn" onClick={()=>setWeekType(week.key,key)} style={{

                  </div>

                    {wt.desc}
                  </div>}
                  <div style={{fontSize:11,color:"#475569",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Week notes</div>
                  <textarea value={weekNotes} onChange={e=>setWeekNotes(e.target.value)}

                    {notesSaved?"✓ Saved":"Save Notes"}
                  </button>
                </div>
              )}

          );
        })}

            <button key={t} className="btn tab-btn" onClick={()=>setTab(t)} style={{padding:"13px 14px",fontSize:13,fontWeight:600,whiteSpace:"nowrap",color:tab===t?"#fff":"#475569",borderBottom:tab===t?"2px solid #f97316":"2px solid transparent"}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"20px 20px 0"}} className="fi">

        {/* PLAN */}
        {tab==="training"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:18}}>
              {WEEKLY.map((s,i)=>(
                <div key={i} style={{background:TAG_BG[s.type],borderRadius:8,padding:"7px 3px",textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:700,color:TAG_TC[s.type],letterSpacing:1,textTransform:"uppercase",opacity:.75}}>{s.day}</div>
                  <div style={{fontSize:9,fontWeight:700,color:TAG_TC[s.type],marginTop:3,lineHeight:1.3}}>{s.session}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:18}}>
              {DAYS.map((day,i)=>(
                <button key={i} className="btn day-btn" onClick={()=>setActiveDay(i)} style={{background:activeDay===i?day.color:"rgba(255,255,255,.04)",border:`1px solid ${activeDay===i?day.color:"rgba(255,255,255,.08)"}`,borderRadius:10,padding:"7px 13px",fontSize:12,fontWeight:700,color:activeDay===i?"#fff":"#94a3b8"}}>
                  {day.label}<br/><span style={{fontSize:10,opacity:.8}}>{day.name.split(" ")[0]}</span>
                </button>
              ))}
            </div>
            <div style={{background:"rgba(255,255,255,.03)",border:`1px solid ${d.color}44`,borderRadius:16,overflow:"hidden"}}>
              <div style={{padding:"14px 18px",background:`linear-gradient(135deg,${d.color}22,transparent)`,borderBottom:`1px solid ${d.color}33`}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:4}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:2,color:d.color}}>{d.name}</div>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:2,padding:"2px 7px",borderRadius:4,background:d.color+"33",color:d.color}}>{d.tag}</div>
                  <div style={{fontSize:11,color:"#475569",marginLeft:"auto"}}>📅 {d.day}</div>
                </div>
                <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6}}>{d.note}</div>
              </div>
              <div className="scroll-x">
                <div style={{minWidth:480}}>
                  <div style={{display:"grid",gridTemplateColumns:"2fr .4fr .7fr .8fr .8fr 1.4fr",padding:"9px 18px",borderBottom:"1px solid rgba(255,255,255,.05)",fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>
                    <div>Exercise</div><div>Sets</div><div>Target</div><div style={{color:"#f97316"}}>Progress</div><div style={{color:"#3b82f6"}}>Eccentric</div><div>Notes</div>
                  </div>
                  {d.exercises.map((ex,i)=>(
                    <div key={ex.id} className="ex-row" style={{display:"grid",gridTemplateColumns:"2fr .4fr .7fr .8fr .8fr 1.4fr",padding:"11px 18px",borderBottom:i<d.exercises.length-1?"1px solid rgba(255,255,255,.04)":"none",alignItems:"center",gap:4}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}><span style={{display:"inline-block",width:20,fontSize:11,color:d.color,fontWeight:700}}>{i+1}.</span>{ex.name}</div>
                      <div style={{fontSize:13,fontWeight:700,color:d.color}}>{ex.sets}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>{ex.target}</div>
                      <div style={{fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:4,textAlign:"center",
                        background:ex.po==="LOAD PR"?"rgba(249,115,22,.2)":ex.po==="REP PR"?"rgba(34,197,94,.15)":"rgba(100,116,139,.15)",
                        color:ex.po==="LOAD PR"?"#f97316":ex.po==="REP PR"?"#22c55e":"#64748b"
                      }}>{ex.po||"—"}</div>
                      <div style={{fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:4,textAlign:"center",
                        background:ex.ecc==="4–5 sec"?"rgba(139,92,246,.2)":ex.ecc==="3 sec"?"rgba(59,130,246,.15)":"rgba(100,116,139,.1)",
                        color:ex.ecc==="4–5 sec"?"#a78bfa":ex.ecc==="3 sec"?"#60a5fa":"#64748b"
                      }}>{ex.ecc||"—"}</div>
                      <div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>{ex.notes}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            {/* PO Legend */}
            <div style={{marginTop:10,padding:"11px 15px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,fontSize:11,lineHeight:1.8}}>
              <div style={{fontWeight:700,color:"#94a3b8",marginBottom:6,fontSize:12}}>Progress Legend</div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{background:"rgba(249,115,22,.2)",color:"#f97316",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>LOAD PR</span><span style={{color:"#64748b"}}>Beat the weight — add load each session</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{background:"rgba(34,197,94,.15)",color:"#22c55e",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>REP PR</span><span style={{color:"#64748b"}}>Beat the reps — same weight, more reps</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{background:"rgba(100,116,139,.15)",color:"#64748b",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>VOLUME</span><span style={{color:"#64748b"}}>Feel and pump — load is secondary</span></div>
              </div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:6}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{background:"rgba(139,92,246,.2)",color:"#a78bfa",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>4–5 sec</span><span style={{color:"#64748b"}}>Mentzer-style slow negative</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{background:"rgba(59,130,246,.15)",color:"#60a5fa",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>3 sec</span><span style={{color:"#64748b"}}>Controlled eccentric — primary hypertrophy driver on volume weeks</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{background:"rgba(100,116,139,.1)",color:"#64748b",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>2 sec</span><span style={{color:"#64748b"}}>Standard controlled — don't rush</span></div>
              </div>
            </div>

            <div style={{marginTop:10,padding:"11px 15px",background:"rgba(249,115,22,.08)",border:"1px solid rgba(249,115,22,.2)",borderRadius:12,fontSize:12,color:"#fdba74",lineHeight:1.7}}>
              <strong>🧬 T-Level Note:</strong> Total T 1,141 / Free T 244 via enclomiphene. Recovery above average — push 2–3 sets to failure on compounds. Log every session in the Tracker and beat last week's numbers.
            </div>
            <div style={{marginTop:8,padding:"11px 15px",background:"rgba(139,92,246,.08)",border:"1px solid rgba(139,92,246,.2)",borderRadius:12,fontSize:12,color:"#c4b5fd",lineHeight:1.7}}>
              <strong>🔄 Bicep Rotation (Day 4):</strong> Week A: Incline Bench Curl + Preacher. Week B: Waiter Curls + Seated Cable Curls. Mentzer Curls every week as primary overload movement.
            </div>
            <div style={{marginTop:8,padding:"11px 15px",background:"rgba(249,115,22,.06)",border:"1px solid rgba(249,115,22,.15)",borderRadius:12,fontSize:12,color:"#fdba74",lineHeight:1.7}}>
              <strong>📅 2-Week Periodisation Cycle:</strong>
              <div style={{marginTop:6,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:"rgba(249,115,22,.1)",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontWeight:700,marginBottom:3}}>💪 Week 1 — Max Effort</div>
                  <div style={{fontSize:11,color:"#fde68a",lineHeight:1.5}}>2–3 sets to failure · 4–8 reps · Heavy load · 2–3 min rest. Beat your last Max Effort numbers.</div>
                </div>
                <div style={{background:"rgba(59,130,246,.1)",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontWeight:700,marginBottom:3,color:"#93c5fd"}}>📈 Week 2 — Volume</div>
                  <div style={{fontSize:11,color:"#bfdbfe",lineHeight:1.5}}>3–4 sets · 10–15 reps · RIR 1–2 · 60–90 sec rest. Stop short of failure — the pump does the work.</div>
                </div>
              </div>
              <div style={{marginTop:6,fontSize:11,color:"#d97706"}}>Every 10–12 weeks (5–6 full cycles) take one deload week at 50% volume to let joints and tendons recover.</div>
            </div>
          </div>
        )}

        {tab==="tracker"&&<Tracker/>}
        {tab==="calendar"&&<CalendarTracker/>}

        {/* DIET */}
        {tab==="diet"&&(
          <div>
            <div style={{marginBottom:10,fontSize:11,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:600}}>3 Meals + Pre-Workout Shake</div>

            {/* Meal Plan Toggle */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              <button className="btn" onClick={()=>setMealPlan("maintenance")} style={{padding:"12px",borderRadius:12,border:`2px solid ${mealPlan==="maintenance"?"#22c55e":"rgba(255,255,255,.08)"}`,background:mealPlan==="maintenance"?"rgba(34,197,94,.1)":"rgba(255,255,255,.03)"}}>
                <div style={{fontSize:13,fontWeight:700,color:mealPlan==="maintenance"?"#22c55e":"#475569",marginBottom:2}}>🎯 Maintenance</div>
                <div style={{fontSize:11,color:mealPlan==="maintenance"?"#86efac":"#475569"}}>~2,700 kcal · Current goal</div>
              </button>
              <button className="btn" onClick={()=>setMealPlan("bulk")} style={{padding:"12px",borderRadius:12,border:`2px solid ${mealPlan==="bulk"?"#f97316":"rgba(255,255,255,.08)"}`,background:mealPlan==="bulk"?"rgba(249,115,22,.1)":"rgba(255,255,255,.03)"}}>
                <div style={{fontSize:13,fontWeight:700,color:mealPlan==="bulk"?"#f97316":"#475569",marginBottom:2}}>💪 Lean Bulk</div>
                <div style={{fontSize:11,color:mealPlan==="bulk"?"#fdba74":"#475569"}}>~3,200 kcal · When gains stall</div>
              </button>
            </div>

            <div style={{padding:"10px 14px",background:mealPlan==="maintenance"?"rgba(34,197,94,.08)":"rgba(249,115,22,.08)",border:`1px solid ${mealPlan==="maintenance"?"rgba(34,197,94,.2)":"rgba(249,115,22,.2)"}`,borderRadius:10,fontSize:12,color:mealPlan==="maintenance"?"#86efac":"#fdba74",lineHeight:1.6,marginBottom:14}}>
              {mealPlan==="maintenance"
                ?"✅ Maintenance mode — stay here as long as you're gaining strength. Switch to Lean Bulk when progress stalls for 3+ consecutive weeks on both week types."
                :"📈 Lean Bulk mode — add ~250 kcal/week from your current intake until you reach 3,200. Don't jump straight there — your sensitive stomach needs time to adapt."}
            </div>

            {/* Batch Cook Guide */}
            <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(249,115,22,.3)",borderRadius:14,padding:"14px",marginBottom:14}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:"#f97316",marginBottom:10}}>🍳 BATCH COOK GUIDE — EVERY 4 DAYS</div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                <div style={{background:"rgba(249,115,22,.08)",borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontSize:10,color:"#f97316",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Beef Per Cook</div>
                  <div style={{fontSize:12,color:"#e2e8f0",lineHeight:1.6}}>{PREP_GUIDE.perCook}</div>
                </div>
                <div style={{background:"rgba(139,92,246,.08)",borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontSize:10,color:"#8b5cf6",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Rice Per Cook</div>
                  <div style={{fontSize:12,color:"#e2e8f0",lineHeight:1.6}}>{PREP_GUIDE.ricePerCook}</div>
                </div>
              </div>

              {/* Cook rhythm */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Cook Rhythm</div>
                {PREP_GUIDE.rhythm.map((r,i)=>(
                  <div key={i} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"10px 12px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#f97316"}}>{r.cook}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>{r.covers}</div>
                    <div style={{fontSize:11,color:"#22c55e",fontWeight:600}}>{r.containers}</div>
                  </div>
                ))}
              </div>

              {/* Portion targets */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Portion Targets — No Scale Needed</div>
                {PREP_GUIDE.portions.map((p,i)=>(
                  <div key={i} style={{background:"rgba(255,255,255,.03)",borderRadius:10,padding:"10px 12px",marginBottom:6}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>{p.label}</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <div style={{fontSize:11,color:"#f97316",background:"rgba(249,115,22,.1)",borderRadius:6,padding:"3px 8px"}}>🥩 {p.scoops} of beef</div>
                      <div style={{fontSize:11,color:"#8b5cf6",background:"rgba(139,92,246,.1)",borderRadius:6,padding:"3px 8px"}}>🍚 {p.rice}</div>
                      <div style={{fontSize:11,color:"#22c55e",background:"rgba(34,197,94,.1)",borderRadius:6,padding:"3px 8px"}}>🥦 {p.veg}</div>
                      <div style={{fontSize:11,color:"#475569",background:"rgba(255,255,255,.05)",borderRadius:6,padding:"3px 8px"}}>📦 {p.containers}</div>
                    </div>
                  </div>
                ))}
                <div style={{fontSize:12,color:"#fdba74",padding:"9px 12px",background:"rgba(249,115,22,.08)",borderRadius:10,marginTop:6}}>
                  💡 <strong>Key ratio:</strong> Meal 3 always gets exactly double the beef and double the rice of Meal 2. Same spoon, just fill it twice.
                </div>
              </div>

              {/* Steps */}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Step-by-Step (~50 min)</div>
                {PREP_GUIDE.steps.map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:i<PREP_GUIDE.steps.length-1?"1px solid rgba(255,255,255,.05)":"none",alignItems:"flex-start"}}>
                    <div style={{minWidth:38,fontSize:10,fontWeight:700,color:"#f97316",paddingTop:1,flexShrink:0}}>{s.time}</div>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>{s.task}</div>
                      <div style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>{s.detail}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{padding:"9px 12px",background:"rgba(59,130,246,.08)",borderRadius:10,fontSize:11,color:"#93c5fd",lineHeight:1.6}}>
                  <strong>🔁 Reheat:</strong> {PREP_GUIDE.reheat}
                </div>
                <div style={{padding:"9px 12px",background:"rgba(34,197,94,.08)",borderRadius:10,fontSize:11,color:"#86efac",lineHeight:1.6}}>
                  <strong>🧊 Fridge life:</strong> {PREP_GUIDE.fridgeLife}
                </div>
              </div>
            </div>

            {/* Meals */}
            {(mealPlan==="maintenance"?MEALS_2700:MEALS).map((meal,i)=>(
              <div key={i} className="card" style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:"14px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{meal.label}</div>
                    <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center",flexWrap:"wrap"}}>
                      <div style={{fontSize:10,color:"#475569"}}>🕐 {meal.time}</div>
                      <div style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:4,background:meal.tagColor+"22",color:meal.tagColor}}>{meal.tag}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                    <div style={{background:"rgba(249,115,22,.15)",border:"1px solid rgba(249,115,22,.3)",borderRadius:8,padding:"3px 9px",fontSize:12,fontWeight:700,color:"#fb923c",marginBottom:3}}>{meal.kcal} kcal</div>
                    <div style={{fontSize:10,color:"#475569"}}>P:{meal.macros.p}g C:{meal.macros.c}g F:{meal.macros.f}g</div>
                  </div>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                  {meal.items.map((item,j)=>(
                    <div key={j} style={{background:"rgba(255,255,255,.05)",borderRadius:6,padding:"3px 9px",fontSize:11,color:"#94a3b8"}}>✓ {item}</div>
                  ))}
                </div>
                <div style={{fontSize:11,color:"#475569",borderTop:"1px solid rgba(255,255,255,.05)",paddingTop:7,lineHeight:1.6}}>
                  <div style={{color:"#64748b",marginBottom:3,fontStyle:"italic"}}>💡 {meal.note}</div>
                  {meal.prep&&<div style={{color:"#475569"}}>🍳 <strong>Prep:</strong> {meal.prep}</div>}
                </div>
              </div>
            ))}
            <div style={{padding:"11px 15px",background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.2)",borderRadius:12,fontSize:12,color:"#93c5fd",lineHeight:1.7}}>
              <strong>💧 Hydration:</strong> 3–4L water daily. Rest days: drop carbs ~80–100g (smaller rice portion), keep protein the same.
            </div>
          </div>
        )}

        {tab==="grocery"&&<GroceryList/>}

        {/* SCHEDULE */}
        {tab==="schedule"&&(
          <div>
            <div style={{marginBottom:12,fontSize:11,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:600}}>Optimized Daily Rhythm</div>
            {SCHEDULE.map((item,i)=>(
              <div key={i} className="sched-row" style={{display:"flex",gap:12,padding:"11px 14px",borderRadius:12,marginBottom:5,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",alignItems:"flex-start"}}>
                <div style={{minWidth:80,fontSize:10,fontWeight:700,color:item.color,paddingTop:2,flexShrink:0}}>{item.time}</div>
                <div style={{width:32,height:32,borderRadius:"50%",background:item.color+"22",border:`2px solid ${item.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{item.icon}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>{item.label}</div>
                  <div style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>{item.note}</div>
                </div>
              </div>
            ))}
            <div style={{marginTop:10,padding:"11px 15px",background:"rgba(234,179,8,.08)",border:"1px solid rgba(234,179,8,.2)",borderRadius:12,fontSize:12,color:"#fde68a",lineHeight:1.7}}>
              <strong>🗓️ Rest Days (Wed + Sun):</strong> Same wake/sleep times. Drop carbs ~80–100g (smaller rice portion). Keep protein identical. Same supplements.
            </div>
          </div>
        )}

        {/* SUPPLEMENTS */}
        {tab==="supplements"&&(
          <div>
            <div style={{marginBottom:10,fontSize:11,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:600}}>Optimized Stack — Built Around Your Protocol</div>
            {SUPPS.map((s,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${s.color}33`,borderLeft:`3px solid ${s.color}`,borderRadius:"0 12px 12px 0",padding:"13px 15px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2,flexWrap:"wrap"}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{s.name}</div>
                      <div style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:s.color+"22",color:s.color}}>{s.status}</div>
                    </div>
                    <div style={{fontSize:11,color:"#64748b"}}>⏰ {s.timing}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:s.color,whiteSpace:"nowrap",marginLeft:12,flexShrink:0}}>{s.dose}</div>
                </div>
                <div style={{fontSize:11,color:"#475569",lineHeight:1.6,borderTop:"1px solid rgba(255,255,255,.05)",paddingTop:6}}>{s.note}</div>
              </div>
            ))}
            <div style={{marginTop:8,padding:"11px 15px",background:"rgba(236,72,153,.08)",border:"1px solid rgba(236,72,153,.2)",borderRadius:12,fontSize:12,color:"#f9a8d4",lineHeight:1.7}}>
              <strong>🏥 Medical Note:</strong> Any changes to enclomiphene or tadalafil dose must go through your Maximus doctor via Elation Passport. Always disclose new supplements to your doctor — some can interact with your protocol.
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
